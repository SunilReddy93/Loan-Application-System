# Application
spring.application.name=loan-eligibility
server.port=8082

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/loan_eligibility_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=your_super_secret_key_which_should_be_at_least_32_characters_long
jwt.expiration=86400000

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# User Management Service
user.management.service.name=user-management

# Internal API Key
internal.api.key=loan-eligibility-service-internal-key

# Resilience4j - Time Limiter
resilience4j.timelimiter.instances.user-management-cb.timeout-duration=10s

# Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.user-management-cb.sliding-window-size=10
resilience4j.circuitbreaker.instances.user-management-cb.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.user-management-cb.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.user-management-cb.permitted-number-of-calls-in-half-open-state=3